<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 1180" width="620" height="1180">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
    <style>
      text { font-family: Arial, sans-serif; font-size: 13px; fill: white; text-anchor: middle; dominant-baseline: central; }
      .label { fill: #555; font-size: 11px; }
      .dialectic-label { fill: #333; font-size: 11px; text-anchor: middle; }
      line, polyline { stroke: #333; stroke-width: 1.5; marker-end: url(#arrow); fill: none; }
    </style>
  </defs>

  <!-- Title -->
  <text x="310" y="20" fill="#333" font-size="16" font-weight="bold">/design</text>

  <!-- Step 0: Session Setup -->
  <rect x="220" y="40" width="180" height="40" rx="4" fill="#6C757D"/>
  <text x="310" y="60">Session Setup</text>
  <line x1="310" y1="80" x2="310" y2="100"/>

  <!-- Step 1: Create Branch -->
  <rect x="220" y="100" width="180" height="40" rx="4" fill="#4A90D9"/>
  <text x="310" y="120">Create Branch</text>
  <line x1="310" y1="140" x2="310" y2="160"/>

  <!-- Step 2a: Collaborative Sketches (parallel) -->
  <rect x="195" y="160" width="230" height="40" rx="4" fill="#17A2B8" stroke="#17A2B8" stroke-width="3"/>
  <text x="310" y="180">5 Collaborative Sketches</text>
  <line x1="310" y1="200" x2="310" y2="230"/>

  <!-- Step 2a.4: Synthesis -->
  <rect x="220" y="230" width="180" height="40" rx="4" fill="#4A90D9"/>
  <text x="310" y="250">Approach Synthesis</text>
  <line x1="310" y1="270" x2="310" y2="300"/>

  <!-- ============================================================
       Step 2a.5: Dialectic Debate + Adjudication (expanded subgraph)
       ============================================================ -->
  <rect x="20" y="300" width="580" height="340" rx="6" fill="#FAF6EF" stroke="#8B5E3C" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="310" y="320" fill="#8B5E3C" font-size="14" font-weight="bold">Step 2a.5 — Dialectic Debate &amp; Adjudication</text>

  <!-- No-divergence skip path (routes around the whole subgraph) -->
  <text x="80" y="330" class="label">no divergence</text>
  <polyline points="220,260 90,260 90,680 220,680" fill="none" stroke="#333" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- Contested decisions (top-5 cap) -->
  <rect x="195" y="340" width="230" height="40" rx="4" fill="#8B5E3C"/>
  <text x="310" y="360">Contested decisions (top-5 cap)</text>
  <line x1="310" y1="380" x2="310" y2="405"/>

  <!-- Fanout: Cursor bucket (odd 1,3,5) + Codex bucket (even 2,4) -->
  <rect x="50" y="405" width="230" height="45" rx="4" fill="#A0724A"/>
  <text x="165" y="420">Cursor debater buckets</text>
  <text x="165" y="437" font-size="11">(decisions 1, 3, 5 — thesis + antithesis)</text>

  <rect x="340" y="405" width="230" height="45" rx="4" fill="#A0724A"/>
  <text x="455" y="420">Codex debater buckets</text>
  <text x="455" y="437" font-size="11">(decisions 2, 4 — thesis + antithesis)</text>

  <!-- Fanout arrows (synthesis -> two buckets) -->
  <polyline points="310,405 165,405" fill="none" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <polyline points="310,405 455,405" fill="none" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Bucket-skipped fallback label -->
  <text x="165" y="460" class="dialectic-label" font-style="italic">Tool unavailable →</text>
  <text x="165" y="474" class="dialectic-label" font-style="italic">Disposition: bucket-skipped</text>
  <text x="455" y="460" class="dialectic-label" font-style="italic">(no Claude substitution</text>
  <text x="455" y="474" class="dialectic-label" font-style="italic">— debate only)</text>

  <!-- Eligibility gate -->
  <rect x="195" y="485" width="230" height="35" rx="4" fill="#8B5E3C"/>
  <text x="310" y="503">Eligibility gate (5 tags + RECOMMEND)</text>

  <!-- Arrows from buckets to eligibility gate -->
  <polyline points="165,450 165,485 220,485" fill="none" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <polyline points="455,450 455,485 400,485" fill="none" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="310" y1="520" x2="310" y2="540"/>

  <!-- Attribution-stripped ballot -->
  <rect x="195" y="540" width="230" height="40" rx="4" fill="#8B5E3C"/>
  <text x="310" y="555">Ballot (Defense A / Defense B)</text>
  <text x="310" y="572" font-size="11">attribution stripped, position rotated</text>
  <line x1="310" y1="580" x2="310" y2="600"/>

  <!-- 3-Judge Panel (replacement-first) -->
  <rect x="155" y="600" width="310" height="38" rx="4" fill="#E8833A" stroke="#E8833A" stroke-width="2"/>
  <text x="310" y="613">3-Judge Binary Panel</text>
  <text x="310" y="629" font-size="11">Cursor + Codex + Claude (replacement-first)</text>

  <!-- Exit from subgraph -->
  <line x1="310" y1="638" x2="310" y2="680"/>

  <!-- ============================================================
       End Step 2a.5 subgraph
       ============================================================ -->

  <!-- Step 2b: Design Plan -->
  <rect x="220" y="680" width="180" height="40" rx="4" fill="#4A90D9"/>
  <text x="310" y="700">Design Plan</text>
  <text x="310" y="715" font-size="10" fill="white">(reads dialectic-resolutions.md)</text>
  <line x1="310" y1="720" x2="310" y2="750"/>

  <!-- Step 3: Plan Review (parallel) — FIXED LABEL -->
  <rect x="170" y="750" width="280" height="40" rx="4" fill="#17A2B8" stroke="#17A2B8" stroke-width="3"/>
  <text x="310" y="770">Plan Review (1 Claude + 1 Codex + 1 Cursor)</text>
  <line x1="310" y1="790" x2="310" y2="820"/>

  <!-- No-issues path: skip voting, go directly to Architecture Diagram -->
  <text x="120" y="805" class="label">no issues</text>
  <polyline points="170,775 130,775 130,980 200,980" fill="none" stroke="#333" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- Step 3: 3-Agent Voting -->
  <rect x="195" y="820" width="230" height="40" rx="4" fill="#E8833A" stroke="#E8833A" stroke-width="3"/>
  <text x="310" y="840">3-Agent Voting Panel</text>
  <line x1="310" y1="860" x2="310" y2="890"/>

  <!-- Decision: Revisions needed? -->
  <polygon points="310,890 400,930 310,970 220,930" fill="#F0AD4E"/>
  <text x="310" y="928" font-size="12">Revisions</text>
  <text x="310" y="942" font-size="12">needed?</text>

  <!-- Yes arrow - revise plan -->
  <text x="415" y="925" class="label">yes</text>
  <polyline points="400,930 450,930 450,1000 400,1000" fill="none" marker-end="url(#arrow)"/>

  <!-- Revise Plan -->
  <rect x="220" y="980" width="180" height="40" rx="4" fill="#4A90D9"/>
  <text x="310" y="1000">Revise Plan</text>
  <line x1="310" y1="1020" x2="310" y2="1050"/>

  <!-- No arrow -->
  <text x="200" y="950" class="label">no</text>
  <polyline points="220,930 170,930 170,980 200,980" fill="none" marker-end="url(#arrow)"/>

  <!-- Step 3b: Architecture Diagram -->
  <rect x="200" y="1050" width="220" height="40" rx="4" fill="#28A745"/>
  <text x="310" y="1070">Architecture Diagram</text>
  <line x1="310" y1="1090" x2="310" y2="1110"/>

  <!-- Step 4: Rejected Findings Report -->
  <rect x="220" y="1110" width="180" height="30" rx="4" fill="#4A90D9"/>
  <text x="310" y="1125">Rejected Findings</text>
  <line x1="310" y1="1140" x2="310" y2="1150"/>

  <!-- Step 5: Cleanup -->
  <rect x="220" y="1150" width="180" height="25" rx="4" fill="#6C757D"/>
  <text x="310" y="1163">Cleanup</text>
</svg>
