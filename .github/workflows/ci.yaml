name: CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  # Linters only: pre-commit over all files (shellcheck, markdownlint,
  # jsonlint, actionlint, agent-lint, agnix, lint-skill-invocations,
  # gitleaks). Test harnesses run in the separate `test-harnesses` job
  # below so harness failures and linter failures can be re-run
  # independently.
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-
      - name: Install pre-commit and PyYAML
        run: pip install pre-commit==4.2.0 pyyaml==6.0.2
      - name: Run pre-commit linters
        run: make lint-only

  # Regression harnesses (the `test-*` bash scripts in Makefile). Runs
  # in parallel with the `lint` job so a harness failure can be diagnosed
  # and re-run without waiting on pre-commit, and vice versa. PyYAML is
  # required because test-lint-skill-invocations invokes the python lint
  # directly (outside the pre-commit venv).
  test-harnesses:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install PyYAML
        run: pip install pyyaml==6.0.2
      - name: Run test harnesses
        run: make test-harnesses

  agent-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: zhupanov/agent-lint@v2.3.2
        with:
          github-token: ${{ github.token }}
          pedantic: true

  agnix:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: agent-sh/agnix@v0.17.0
        with:
          target: 'claude-code'
          config: '.agnix.toml'

  # Dedicated gitleaks gate — git-HISTORY scan (complementary to the
  # `lint` job, which runs the pre-commit gitleaks hook over the working
  # tree only via `--no-git`). Installs the same pinned v8.18.4 engine
  # directly so local-pre-commit and CI agree on engine version.
  # `fetch-depth: 0` is required because `gitleaks detect` walks the
  # git log.
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install gitleaks v8.18.4
        # SHA256 pinned for supply-chain integrity — a swapped release
        # asset would change this hash. Sourced from the upstream
        # gitleaks_8.18.4_checksums.txt; verify on bump:
        #   curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_checksums.txt \
        #     | grep linux_x64
        env:
          GITLEAKS_SHA256: ba6dbb656933921c775ee5a2d1c13a91046e7952e9d919f9bac4cec61d628e7d
        run: |
          set -euo pipefail
          curl -sSfL -o /tmp/gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz
          echo "${GITLEAKS_SHA256}  /tmp/gitleaks.tar.gz" | sha256sum --check --strict
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp/
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Scan git history
        run: gitleaks detect --source . --redact --no-banner

  # Trufflehog verified-only scan. Independent of gitleaks — catches
  # credentials that authenticate against a live provider API even if
  # gitleaks' regex rules miss them. Action pinned to commit SHA
  # (supply-chain: tags are mutable; a force-pushed tag could silently
  # swap the scanner binary). `version: 3.82.13` also pins the scanner
  # Docker image so both action driver and scanner engine are pinned.
  trufflehog:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      # Pinned to commit SHA for v3.82.13 (verify with
      # `git ls-remote https://github.com/trufflesecurity/trufflehog refs/tags/v3.82.13`).
      - uses: trufflesecurity/trufflehog@1aa1871f9ae24a8c8a3a48a9345514acf42beb39
        with:
          version: 3.82.13
          path: ./
          extra_args: --only-verified

  agent-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Regenerate agents/code-reviewer.md and check for drift
        run: |
          bash scripts/generate-code-reviewer-agent.sh --check
      - name: Assert focus-area enum includes 'security' in canonical surfaces
        run: |
          set -euo pipefail
          # Files where the formal backticked enum lives. These are the
          # authoritative declarations of the focus-area tag set.
          BACKTICKED_FILES=(
            skills/shared/reviewer-templates.md
            agents/code-reviewer.md
            docs/review-agents.md
          )
          # Files where the enum appears unquoted (slash-separated) inside
          # Cursor/Codex prompt strings in the Voting-Protocol SKILL.md
          # callers. These prompts are what external reviewers actually see,
          # so a regression here silently weakens the review panel.
          UNQUOTED_FILES=(
            skills/review/SKILL.md
            skills/design/SKILL.md
            skills/implement/SKILL.md
          )
          # Note: README.md and docs/agents.md use natural prose
          # ("code quality, risk/integration, correctness, architecture,
          # security") that does not match a stable enum-like regex. They are
          # maintained by hand during Phase 2 and are not mechanically
          # checked here. /research is intentionally excluded — its
          # external-reviewer prose uses a different taxonomy. /loop-review
          # post-overhaul is a thin delegator whose SKILL.md does NOT carry
          # reviewer prompts at all (loop control moved to driver.sh; the
          # per-slice /review subprocess carries the prompts via
          # skills/review/SKILL.md, which IS in UNQUOTED_FILES above).
          exit_code=0

          # shellcheck disable=SC2016
          # Backticked enum: literal backticks in the regex are intentional;
          # the single-quotes around the pattern prevent the shell from
          # parsing them as command substitution.
          for f in "${BACKTICKED_FILES[@]}"; do
            if [[ ! -f "$f" ]]; then
              echo "::error file=$f::expected file is missing"
              exit_code=1
              continue
            fi
            if grep -n '`code-quality`.*`risk-integration`.*`correctness`.*`architecture`' "$f" >/tmp/hits 2>/dev/null; then
              while IFS= read -r hit; do
                line_no="${hit%%:*}"
                line_text="${hit#*:}"
                if ! printf '%s\n' "$line_text" | grep -q 'security'; then
                  echo "::error file=$f,line=$line_no::backticked focus-area enumeration does not include 'security': $line_text"
                  exit_code=1
                fi
              done </tmp/hits
            else
              echo "::error file=$f::no backticked focus-area enumeration found (file should contain the canonical \`code-quality\`/\`risk-integration\`/... enum)"
              exit_code=1
            fi
          done

          # Unquoted slash-separated enum (as it appears inside SKILL.md
          # prompt strings for Cursor/Codex).
          for f in "${UNQUOTED_FILES[@]}"; do
            if [[ ! -f "$f" ]]; then
              echo "::error file=$f::expected file is missing"
              exit_code=1
              continue
            fi
            if grep -n 'code-quality / risk-integration / correctness / architecture' "$f" >/tmp/hits 2>/dev/null; then
              while IFS= read -r hit; do
                line_no="${hit%%:*}"
                line_text="${hit#*:}"
                if ! printf '%s\n' "$line_text" | grep -q 'security'; then
                  echo "::error file=$f,line=$line_no::unquoted focus-area enumeration does not include 'security': $line_text"
                  exit_code=1
                fi
              done </tmp/hits
            else
              echo "::error file=$f::no unquoted focus-area enumeration found (SKILL.md should contain the slash-separated enum in Cursor/Codex prompt strings)"
              exit_code=1
            fi
          done

          rm -f /tmp/hits
          exit "$exit_code"

  smoke-dialectic:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v6
      - name: Run dialectic smoke test
        # Invokes scripts/dialectic-smoke-test.sh directly; the `make smoke-dialectic`
        # target is equivalent and exists for local developer convenience.
        run: bash scripts/dialectic-smoke-test.sh
