name: CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  # Linters only: pre-commit over all files (shellcheck, markdownlint,
  # jsonlint, actionlint, agent-lint, agnix, lint-skill-invocations).
  # Test harnesses run in the separate `test-harnesses` job below so
  # harness failures and linter failures can be re-run independently.
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-
      - name: Install pre-commit and PyYAML
        run: pip install pre-commit==4.2.0 pyyaml==6.0.2
      - name: Run pre-commit linters
        run: make lint-only

  # Regression harnesses (the `test-*` bash scripts in Makefile). Runs
  # in parallel with the `lint` job so a harness failure can be diagnosed
  # and re-run without waiting on pre-commit, and vice versa. PyYAML is
  # required because test-lint-skill-invocations invokes the python lint
  # directly (outside the pre-commit venv).
  test-harnesses:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install PyYAML
        run: pip install pyyaml==6.0.2
      - name: Run test harnesses
        run: make test-harnesses

  agent-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: zhupanov/agent-lint@v2.3.2
        with:
          github-token: ${{ github.token }}
          pedantic: true

  agnix:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: agent-sh/agnix@v0.17.0
        with:
          target: 'claude-code'
          config: '.agnix.toml'

  agent-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Regenerate agents/code-reviewer.md and check for drift
        run: |
          bash scripts/generate-code-reviewer-agent.sh --check
      - name: Assert focus-area enum includes 'security' in canonical surfaces
        run: |
          set -euo pipefail
          # Files where the formal backticked enum lives. These are the
          # authoritative declarations of the focus-area tag set.
          BACKTICKED_FILES=(
            skills/shared/reviewer-templates.md
            agents/code-reviewer.md
            docs/review-agents.md
          )
          # Files where the enum appears unquoted (slash-separated) inside
          # Cursor/Codex prompt strings in the Voting-Protocol SKILL.md
          # callers. These prompts are what external reviewers actually see,
          # so a regression here silently weakens the review panel.
          UNQUOTED_FILES=(
            skills/review/SKILL.md
            skills/design/SKILL.md
            skills/implement/SKILL.md
          )
          # Note: README.md and docs/agents.md use natural prose
          # ("code quality, risk/integration, correctness, architecture,
          # security") that does not match a stable enum-like regex. They are
          # maintained by hand during Phase 2 and are not mechanically
          # checked here. Negotiation-Protocol skills (loop-review, research)
          # are intentionally excluded — their external-reviewer prose uses a
          # different taxonomy and is tracked as a focused follow-up.
          exit_code=0

          # shellcheck disable=SC2016
          # Backticked enum: literal backticks in the regex are intentional;
          # the single-quotes around the pattern prevent the shell from
          # parsing them as command substitution.
          for f in "${BACKTICKED_FILES[@]}"; do
            if [[ ! -f "$f" ]]; then
              echo "::error file=$f::expected file is missing"
              exit_code=1
              continue
            fi
            if grep -n '`code-quality`.*`risk-integration`.*`correctness`.*`architecture`' "$f" >/tmp/hits 2>/dev/null; then
              while IFS= read -r hit; do
                line_no="${hit%%:*}"
                line_text="${hit#*:}"
                if ! printf '%s\n' "$line_text" | grep -q 'security'; then
                  echo "::error file=$f,line=$line_no::backticked focus-area enumeration does not include 'security': $line_text"
                  exit_code=1
                fi
              done </tmp/hits
            else
              echo "::error file=$f::no backticked focus-area enumeration found (file should contain the canonical \`code-quality\`/\`risk-integration\`/... enum)"
              exit_code=1
            fi
          done

          # Unquoted slash-separated enum (as it appears inside SKILL.md
          # prompt strings for Cursor/Codex).
          for f in "${UNQUOTED_FILES[@]}"; do
            if [[ ! -f "$f" ]]; then
              echo "::error file=$f::expected file is missing"
              exit_code=1
              continue
            fi
            if grep -n 'code-quality / risk-integration / correctness / architecture' "$f" >/tmp/hits 2>/dev/null; then
              while IFS= read -r hit; do
                line_no="${hit%%:*}"
                line_text="${hit#*:}"
                if ! printf '%s\n' "$line_text" | grep -q 'security'; then
                  echo "::error file=$f,line=$line_no::unquoted focus-area enumeration does not include 'security': $line_text"
                  exit_code=1
                fi
              done </tmp/hits
            else
              echo "::error file=$f::no unquoted focus-area enumeration found (SKILL.md should contain the slash-separated enum in Cursor/Codex prompt strings)"
              exit_code=1
            fi
          done

          rm -f /tmp/hits
          exit "$exit_code"

  smoke-dialectic:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v6
      - name: Run dialectic smoke test
        # Invokes scripts/dialectic-smoke-test.sh directly; the `make smoke-dialectic`
        # target is equivalent and exists for local developer convenience.
        run: bash scripts/dialectic-smoke-test.sh
