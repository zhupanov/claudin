[lint]
suppress = [
  "body-too-long",
  "script-deps-missing",
  "body-no-default",
  "mcp-tool-unqualified",
  "desc-body-misalign",
  "terminology-inconsistent",
  # nested-ref-deep is suppressed because the anti-halt continuation banner
  # (closes #177) requires every orchestrator SKILL.md to cite
  # skills/shared/subskill-invocation.md as the canonical source of the
  # rule. subskill-invocation.md itself contains many inline SKILL.md
  # example references (which the S029 rule counts as "nested"), but the
  # banner carries the operative one-sentence rule inline — the canonical
  # reference is a discoverability aid, not a mandatory cross-ref chain.
  # The rule's stated concern ("humans/LLMs chasing chained refs") does not
  # apply to this use case. See AGENTS.md "Editing rules" for the anti-halt
  # banner convention.
  "nested-ref-deep",
  # tools-unknown (S040) is suppressed because agent-lint 2.3.2's built-in
  # tool registry predates the `Monitor` tool (introduced in Claude Code
  # after the agent-lint release shipped). `Monitor` is a first-party
  # Claude Code tool used by `skills/loop-improve-skill/SKILL.md` (closes
  # #291) for passive log-tailing observability over the driver's output
  # file. Suppression is global because agent-lint 2.3.2 does not support
  # per-file or per-token exceptions for this rule. Revisit when agent-lint
  # is upgraded — once the registry includes Monitor, remove this entry.
  "tools-unknown",
]

# scripts/test-sessionstart-health.sh is the regression test for the
# SessionStart hook (scripts/sessionstart-health.sh). It is a plugin-level
# infrastructure test — not owned by any SKILL.md — and is invoked via
# `make lint` (test-sessionstart target). Agent-lint's dead-script rule
# only recognizes structured references from SKILL.md/hooks.json/ci.yaml,
# so we exclude the test path explicitly.
#
# scripts/audit-edit-write.sh and scripts/test-audit-edit-write.sh are the
# dev-only opt-in PostToolUse audit hook pair — structurally referenced from
# Makefile (test target), docs/dev-hook-audit.md (enable snippet), AGENTS.md,
# and SECURITY.md, but NOT from hooks/hooks.json or .claude/settings.json by
# design (issue #155: contributors opt in locally via gitignored
# .claude/settings.local.json). agent-lint's G004/dead-script rule only scans
# SKILL.md / CLAUDE.md / hooks.json / settings.json for invocation refs and
# does not follow CLAUDE.md @-imports or Makefile targets, so these two
# scripts would be false-flagged. Excluded here rather than force-registered
# to preserve the dev-only opt-in contract.
#
# scripts/test-deny-edit-write.sh is the regression harness for
# scripts/deny-edit-write.sh (the skill-scoped PreToolUse deny hook for
# /research). The hook script itself IS structurally referenced from
# skills/research/SKILL.md's hooks: frontmatter and is therefore not
# excluded; the test script is referenced only from Makefile, matching the
# same Makefile-only pattern as the test-sessionstart-health.sh entry above.
#
# scripts/test-post-scaffold-hints.sh is the regression harness for
# skills/create-skill/scripts/post-scaffold-hints.sh (the post-scaffold
# reminder emitter invoked by /create-skill). The hints script itself IS
# structurally referenced from skills/create-skill/SKILL.md Step 3 and is
# therefore not excluded; the test script is referenced only from Makefile
# (test-post-scaffold-hints target) and AGENTS.md, matching the same
# Makefile-only pattern as the test-deny-edit-write.sh entry above.
#
# skills/create-skill/scripts/test-render-skill-md.sh is the regression
# harness for render-skill-md.sh (the scaffold generator). The generator
# itself IS structurally referenced from skills/create-skill/SKILL.md's
# Step 3 feature-description template and is therefore not excluded; the
# test script is referenced only from Makefile's test-render-skill target,
# matching the same Makefile-only pattern as the entries above.
#
# scripts/lib-count-commits.sh is a sourced-only shell library (no shebang,
# not invokable directly). It is referenced from scripts/check-bump-version.sh
# and scripts/verify-skill-called.sh via `source` directives only — agent-lint
# does not follow `source` directives in sibling scripts, so the library
# would be false-flagged as dead. scripts/test-verify-skill-called.sh is the
# regression harness for scripts/verify-skill-called.sh and is referenced
# only from Makefile, matching the same Makefile-only pattern as the other
# test-* harnesses above.
#
# scripts/test-check-bump-version.sh is the regression harness for
# scripts/check-bump-version.sh (#172). It is referenced only from Makefile
# (test-check-bump-version target) and AGENTS.md, matching the same
# Makefile-only pattern as the other test-* harnesses above.
#
# scripts/test-lint-skill-invocations.sh is the regression harness for
# scripts/lint-skill-invocations.py (the skill-invocation documentation lint).
# The lint script itself IS structurally referenced from .pre-commit-config.yaml
# (local hook `lint-skill-invocations`) and is therefore not excluded; the test
# harness is referenced only from Makefile (test-lint-skill-invocations target)
# and AGENTS.md, matching the same Makefile-only pattern as the other test-*
# harnesses above.
#
# skills/fix-issue/scripts/test-parse-prose-blockers.sh is the regression
# harness for skills/fix-issue/scripts/parse-prose-blockers.sh (the prose-
# dependency parser invoked by skills/fix-issue/scripts/fetch-eligible-issue.sh).
# The parser itself IS structurally referenced from skills/fix-issue/SKILL.md's
# Step 1 eligibility description and from fetch-eligible-issue.sh's
# prose_open_blockers function, and is therefore not excluded; the test
# harness is referenced only from Makefile (test-parse-prose-blockers target)
# and AGENTS.md, matching the same Makefile-only pattern as the other test-*
# harnesses above.
#
# scripts/test-anti-halt-banners.sh is the regression harness for the
# anti-halt continuation banner (closes #177). The harness asserts banner
# presence in 6 orchestrator SKILL.md files (fix-issue, implement, review,
# loop-review, alias, research) and absence in 4 pure-delegator SKILL.md
# files (im, imaq, create-skill, loop-improve-skill). The retired
# loop-improve-skill-iter skill is no longer named; /loop-improve-skill
# is now a pure delegator whose runtime lives in scripts/driver.sh (#273).
# It is structurally referenced from Makefile (test-anti-halt target) and
# AGENTS.md, matching the same Makefile-only pattern as the other test-*
# harnesses above.
#
# scripts/test-subskill-anchors.sh is the regression harness for every
# `<path>/SKILL.md § <heading>` citation in skills/shared/subskill-invocation.md
# (closes #236). The harness enforces heading-anchor resolution against the
# referenced SKILL.md files — a contract orthogonal to the invocation-wording
# contract enforced by scripts/lint-skill-invocations.py. It is referenced
# only from Makefile (test-subskill-anchors target) and AGENTS.md, matching
# the same Makefile-only pattern as the other test-* harnesses above.
#
# scripts/test-loop-improve-skill-driver.sh is the regression harness for
# skills/loop-improve-skill/scripts/driver.sh (the Option B bash-driver
# topology introduced by #273 that replaces the previous outer→inner→three-
# children Skill-tool chain; /loop-improve-skill-iter and the prior
# continuation harness are retired). The harness performs structural asserts
# on driver.sh source (parse-skill-judge-grade.sh invocation, claude --version
# forensic capture, set -euo pipefail, verify-skill-called.sh --stdout-line
# mechanical gate, LOOP_TMPDIR /tmp/ + /private/tmp/ prefix literals, `..`
# rejection check, file-based prompt writes via $LOOP_TMPDIR/iter-${ITER}-*-
# prompt.txt, redact-secrets.sh in gh-comment pipeline) plus a small number of
# behavioral smoke fixtures with stubbed `claude` and `gh` on PATH. It is
# referenced only from Makefile (test-loop-improve-skill-driver target) and
# AGENTS.md, matching the same Makefile-only pattern as the other test-*
# harnesses above.
#
# scripts/test-parse-skill-judge-grade.sh is the regression harness for
# scripts/parse-skill-judge-grade.sh (the /skill-judge output parser
# consumed by /loop-improve-skill's grade-gated termination contract).
# The parser itself IS structurally referenced from
# skills/loop-improve-skill/scripts/driver.sh (both the in-loop Phase 1.v
# grade parse and the Step 5a final post-iter-cap re-evaluation) and is
# therefore not excluded; the test harness is referenced only from
# Makefile (test-parse-skill-judge-grade target) and AGENTS.md, matching
# the same Makefile-only pattern as the other test-* harnesses above.
#
# scripts/test-implement-structure.sh is the structural regression harness
# for skills/implement/SKILL.md and skills/implement/references/ invariants
# (closes #234). Companion to scripts/test-implement-rebase-macro.sh: the
# macro harness owns Rebase Checkpoint Macro placement/registry mechanics,
# this harness owns top-level section headings (Load-Bearing Invariants /
# NEVER List / Rebase Checkpoint Macro), the MANDATORY ↔ reference-file
# binding, the CI-parity focus-area enum check, reference-file contract
# headers (Consumer/Contract/When-to-load), and the no-`see Step N
# below|above` invariant in references/*.md. It is referenced only from
# Makefile (test-implement-structure target) and AGENTS.md, matching the
# same Makefile-only pattern as the other test-* harnesses above.
#
# scripts/test-loop-improve-skill-skill-md.sh is the structural regression
# harness for skills/loop-improve-skill/SKILL.md (closes #291 — the live-
# streaming pattern: background Bash launch + Monitor attach, visible log-
# path emission, filter-regex parity with driver.sh breadcrumb helpers).
# Companion to scripts/test-loop-improve-skill-driver.sh: the driver harness
# pins driver.sh contract tokens; this harness pins the SKILL.md contract
# tokens introduced by the #291 pattern. It is referenced only from Makefile
# (test-loop-improve-skill-skill-md target) and AGENTS.md, matching the
# Makefile-only pattern as the other test-* harnesses above.
#
# scripts/test-loop-improve-skill-halt-rate.sh is the opt-in halt-rate
# regression probe for /larch:loop-improve-skill (closes #278). Referenced
# only from Makefile (halt-rate-probe target, NOT a lint prerequisite) and
# AGENTS.md; matches the Makefile-only pattern as the other harnesses above.
# scripts/lib-loop-improve-halt-ledger.sh is the sourced-only helper that
# classify_halt_location lives in; referenced only via `source` from the
# halt-rate probe and its test harness, which agent-lint does not follow.
# scripts/test-lib-loop-improve-halt-ledger.sh is the offline regression
# harness for the ledger lib, referenced only from Makefile
# (test-lib-halt-ledger target).
#
# scripts/test-orchestrator-scope-sync.sh is the cross-validation harness
# (closes #285) that asserts exact set equality between the ORCHESTRATORS /
# DELEGATORS arrays in scripts/test-anti-halt-banners.sh and the bulleted
# scope lists under "### Scope list" in skills/shared/subskill-invocation.md.
# Referenced only from Makefile (test-orchestrator-scope-sync target) and
# AGENTS.md; matches the Makefile-only pattern as the other harnesses above.
exclude = [
  "scripts/test-sessionstart-health.sh",
  "scripts/audit-edit-write.sh",
  "scripts/test-audit-edit-write.sh",
  "scripts/test-deny-edit-write.sh",
  "scripts/test-post-scaffold-hints.sh",
  "skills/create-skill/scripts/test-render-skill-md.sh",
  "scripts/lib-count-commits.sh",
  "scripts/test-verify-skill-called.sh",
  "scripts/test-check-bump-version.sh",
  "scripts/test-lint-skill-invocations.sh",
  "skills/fix-issue/scripts/test-parse-prose-blockers.sh",
  "scripts/test-anti-halt-banners.sh",
  "scripts/test-design-structure.sh",
  "scripts/test-implement-rebase-macro.sh",
  "scripts/test-implement-structure.sh",
  "scripts/test-subskill-anchors.sh",
  "scripts/test-loop-improve-skill-driver.sh",
  "scripts/test-loop-improve-skill-skill-md.sh",
  "scripts/test-parse-skill-judge-grade.sh",
  "scripts/test-loop-improve-skill-halt-rate.sh",
  "scripts/lib-loop-improve-halt-ledger.sh",
  "scripts/test-lib-loop-improve-halt-ledger.sh",
  "scripts/test-orchestrator-scope-sync.sh",
]
