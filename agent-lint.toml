# skills/fix-issue/SKILL.md Step 5a bail-detection prose (Phase 4 of umbrella
# #348; renumbered from Step 6a by the fold-find-and-lock refactor closes
# #496): `--issue $ISSUE_NUMBER` forwarding in both SIMPLE and HARD bullets,
