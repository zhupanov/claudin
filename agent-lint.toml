[lint]
suppress = [
  "body-too-long",
  "script-deps-missing",
  "body-no-default",
  "mcp-tool-unqualified",
  "desc-body-misalign",
  "terminology-inconsistent",
  # nested-ref-deep is suppressed because the anti-halt continuation banner
  # (closes #177) requires every orchestrator SKILL.md to cite
  # skills/shared/subskill-invocation.md as the canonical source of the
  # rule. subskill-invocation.md itself contains many inline SKILL.md
  # example references (which the S029 rule counts as "nested"), but the
  # banner carries the operative one-sentence rule inline — the canonical
  # reference is a discoverability aid, not a mandatory cross-ref chain.
  # The rule's stated concern ("humans/LLMs chasing chained refs") does not
  # apply to this use case. See `skills/shared/subskill-invocation.md`
  # (normative home of the anti-halt banner convention).
  "nested-ref-deep",
  # tools-unknown (S040) is suppressed because agent-lint 2.3.2's built-in
  # tool registry predates the `Monitor` tool (introduced in Claude Code
  # after the agent-lint release shipped). `Monitor` is a first-party
  # Claude Code tool used by `skills/loop-improve-skill/SKILL.md` (closes
  # #291) for passive log-tailing observability over the driver's output
  # file. Suppression is global because agent-lint 2.3.2 does not support
  # per-file or per-token exceptions for this rule. Revisit when agent-lint
  # is upgraded — once the registry includes Monitor, remove this entry.
  "tools-unknown",
]

# scripts/test-sessionstart-health.sh is the regression test for the
# SessionStart hook (scripts/sessionstart-health.sh). It is a plugin-level
# infrastructure test — not owned by any SKILL.md — and is invoked via
# `make lint` (test-sessionstart target). Agent-lint's dead-script rule
# only recognizes structured references from SKILL.md/hooks.json/ci.yaml,
# so we exclude the test path explicitly.
#
# scripts/audit-edit-write.sh and scripts/test-audit-edit-write.sh are the
# dev-only opt-in PostToolUse audit hook pair — structurally referenced from
# Makefile (test target), docs/dev-hook-audit.md (enable snippet),
# scripts/audit-edit-write.md (sibling contract), and SECURITY.md, but NOT
# from hooks/hooks.json or .claude/settings.json by design (issue #155:
# contributors opt in locally via gitignored .claude/settings.local.json).
# agent-lint's G004/dead-script rule only scans SKILL.md / CLAUDE.md /
# hooks.json / settings.json for invocation refs and does not follow CLAUDE.md
# @-imports or Makefile targets, so these two scripts would be false-flagged.
# Excluded here rather than force-registered to preserve the dev-only opt-in
# contract.
#
# scripts/test-deny-edit-write.sh is the regression harness for
# scripts/deny-edit-write.sh (the skill-scoped PreToolUse deny hook for
# /research). The hook script itself IS structurally referenced from
# skills/research/SKILL.md's hooks: frontmatter and is therefore not
# excluded; the test script is referenced only from Makefile, matching the
# same Makefile-only pattern as the test-sessionstart-health.sh entry above.
#
# scripts/test-post-scaffold-hints.sh is the regression harness for
# skills/create-skill/scripts/post-scaffold-hints.sh (the post-scaffold
# reminder emitter invoked by /create-skill). The hints script itself IS
# structurally referenced from skills/create-skill/SKILL.md Step 3 and is
# therefore not excluded; the test script is referenced only from Makefile
# (test-post-scaffold-hints target) and
# skills/create-skill/scripts/post-scaffold-hints.md (sibling contract),
# matching the same Makefile-only pattern as the test-deny-edit-write.sh
# entry above.
#
# skills/create-skill/scripts/test-render-skill-md.sh is the regression
# harness for render-skill-md.sh (the scaffold generator). The generator
# itself IS structurally referenced from skills/create-skill/SKILL.md's
# Step 3 feature-description template and is therefore not excluded; the
# test script is referenced only from Makefile's test-render-skill target,
# matching the same Makefile-only pattern as the entries above.
#
# scripts/lib-count-commits.sh is a sourced-only shell library (no shebang,
# not invokable directly). It is referenced from scripts/check-bump-version.sh
# and scripts/verify-skill-called.sh via `source` directives only — agent-lint
# does not follow `source` directives in sibling scripts, so the library
# would be false-flagged as dead. scripts/test-verify-skill-called.sh is the
# regression harness for scripts/verify-skill-called.sh and is referenced
# only from Makefile, matching the same Makefile-only pattern as the other
# test-* harnesses above. Both are documented in scripts/verify-skill-called.md
# (sibling contract).
#
