[lint]
suppress = [
  "body-too-long",
  "script-deps-missing",
  "body-no-default",
  "mcp-tool-unqualified",
  "desc-body-misalign",
  "terminology-inconsistent",
]

# scripts/test-sessionstart-health.sh is the regression test for the
# SessionStart hook (scripts/sessionstart-health.sh). It is a plugin-level
# infrastructure test — not owned by any SKILL.md — and is invoked via
# `make lint` (test-sessionstart target). Agent-lint's dead-script rule
# only recognizes structured references from SKILL.md/hooks.json/ci.yaml,
# so we exclude the test path explicitly.
#
# scripts/audit-edit-write.sh and scripts/test-audit-edit-write.sh are the
# dev-only opt-in PostToolUse audit hook pair — structurally referenced from
# Makefile (test target), docs/dev-hook-audit.md (enable snippet), AGENTS.md,
# and SECURITY.md, but NOT from hooks/hooks.json or .claude/settings.json by
# design (issue #155: contributors opt in locally via gitignored
# .claude/settings.local.json). agent-lint's G004/dead-script rule only scans
# SKILL.md / CLAUDE.md / hooks.json / settings.json for invocation refs and
# does not follow CLAUDE.md @-imports or Makefile targets, so these two
# scripts would be false-flagged. Excluded here rather than force-registered
# to preserve the dev-only opt-in contract.
#
# scripts/test-deny-edit-write.sh is the regression harness for
# scripts/deny-edit-write.sh (the skill-scoped PreToolUse deny hook for
# /research). The hook script itself IS structurally referenced from
# skills/research/SKILL.md's hooks: frontmatter and is therefore not
# excluded; the test script is referenced only from Makefile, matching the
# same Makefile-only pattern as the test-sessionstart-health.sh entry above.
#
# scripts/test-post-scaffold-hints.sh is the regression harness for
# skills/create-skill/scripts/post-scaffold-hints.sh (the post-scaffold
# reminder emitter invoked by /create-skill). The hints script itself IS
# structurally referenced from skills/create-skill/SKILL.md Step 3 and is
# therefore not excluded; the test script is referenced only from Makefile
# (test-post-scaffold-hints target) and AGENTS.md, matching the same
# Makefile-only pattern as the test-deny-edit-write.sh entry above.
#
# skills/create-skill/scripts/test-render-skill-md.sh is the regression
# harness for render-skill-md.sh (the scaffold generator). The generator
# itself IS structurally referenced from skills/create-skill/SKILL.md's
# Step 3 feature-description template and is therefore not excluded; the
# test script is referenced only from Makefile's test-render-skill target,
# matching the same Makefile-only pattern as the entries above.
#
# scripts/lib-count-commits.sh is a sourced-only shell library (no shebang,
# not invokable directly). It is referenced from scripts/check-bump-version.sh
# and scripts/verify-skill-called.sh via `source` directives only — agent-lint
# does not follow `source` directives in sibling scripts, so the library
# would be false-flagged as dead. scripts/test-verify-skill-called.sh is the
# regression harness for scripts/verify-skill-called.sh and is referenced
# only from Makefile, matching the same Makefile-only pattern as the other
# test-* harnesses above.
#
# scripts/test-check-bump-version.sh is the regression harness for
# scripts/check-bump-version.sh (#172). It is referenced only from Makefile
# (test-check-bump-version target) and AGENTS.md, matching the same
# Makefile-only pattern as the other test-* harnesses above.
#
# scripts/test-lint-skill-invocations.sh is the regression harness for
# scripts/lint-skill-invocations.py (the skill-invocation documentation lint).
# The lint script itself IS structurally referenced from .pre-commit-config.yaml
# (local hook `lint-skill-invocations`) and is therefore not excluded; the test
# harness is referenced only from Makefile (test-lint-skill-invocations target)
# and AGENTS.md, matching the same Makefile-only pattern as the other test-*
# harnesses above.
#
# skills/fix-issue/scripts/test-parse-prose-blockers.sh is the regression
# harness for skills/fix-issue/scripts/parse-prose-blockers.sh (the prose-
# dependency parser invoked by skills/fix-issue/scripts/fetch-eligible-issue.sh).
# The parser itself IS structurally referenced from skills/fix-issue/SKILL.md's
# Step 1 eligibility description and from fetch-eligible-issue.sh's
# prose_open_blockers function, and is therefore not excluded; the test
# harness is referenced only from Makefile (test-parse-prose-blockers target)
# and AGENTS.md, matching the same Makefile-only pattern as the other test-*
# harnesses above.
exclude = [
  "scripts/test-sessionstart-health.sh",
  "scripts/audit-edit-write.sh",
  "scripts/test-audit-edit-write.sh",
  "scripts/test-deny-edit-write.sh",
  "scripts/test-post-scaffold-hints.sh",
  "skills/create-skill/scripts/test-render-skill-md.sh",
  "scripts/lib-count-commits.sh",
  "scripts/test-verify-skill-called.sh",
  "scripts/test-check-bump-version.sh",
  "scripts/test-lint-skill-invocations.sh",
  "skills/fix-issue/scripts/test-parse-prose-blockers.sh",
]
