# Larch pre-commit configuration
# Single source of truth for linter definitions.
# CI uses: make lint (repo-wide via pre-commit run --all-files)
# /relevant-checks uses: pre-commit run --files <changed-files> (scoped)
# Developers use: pre-commit install (opt-in git hook)

exclude: ^(\.venv/|node_modules/)

repos:
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: [-x]

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.44.0
    hooks:
      - id: markdownlint
        args: [--config, .markdownlint.json]

  - repo: local
    hooks:
      - id: jsonlint
        name: Validate JSON files
        entry: bash -c 'for f; do jq . "$f" > /dev/null || exit 1; done' --
        language: system
        types: [json]

  - repo: https://github.com/zhupanov/agent-lint
    rev: v2.3.2
    hooks:
      - id: agent-lint
        args: [--pedantic]

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
        # Override upstream's `gitleaks protect --staged` and use
        # `detect --no-git` so the hook scans the working tree (which
        # includes staged/uncommitted content at commit time). `--no-git`
        # is load-bearing: without it, `gitleaks detect` scans only git
        # history and silently passes secrets that are staged but not
        # yet committed. `pass_filenames: false` is intentional — the
        # hook always scans the whole tree, even when pre-commit is
        # invoked with a scoped `--files <path>` argument. Git-history
        # scanning is the dedicated CI job's responsibility (see
        # .github/workflows/ci.yaml `gitleaks` job).
        entry: gitleaks detect --source . --no-git --redact --no-banner
        pass_filenames: false

  - repo: local
    hooks:
      - id: lint-skill-invocations
        name: Lint skill-invocation docs
        entry: python scripts/lint-skill-invocations.py
        language: python
        additional_dependencies: ['pyyaml==6.0.2']
        pass_filenames: false
        always_run: true
        files: ^(skills|\.claude/skills)/[^/]+/SKILL\.md$

  - repo: local
    hooks:
      - id: agnix
        name: Lint AI agent configuration files
        entry: agnix .
        language: node
        additional_dependencies: ['agnix@0.17.0']
        pass_filenames: false
        files: |
          (?x)^(
            .*SKILL\.md|
            .*CLAUDE\.md|
            .*CLAUDE\.local\.md|
            .*AGENTS\.md|
            agents/.*\.md|
            \.claude/agents/.*\.md|
            \.claude/settings\.json|
            \.claude/settings\.local\.json|
            hooks/hooks\.json|
            \.claude-plugin/.*\.json|
            .*\.mcp\.json
          )$
